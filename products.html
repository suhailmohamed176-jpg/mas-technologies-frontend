<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Products - MAS Technologies</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <header class="navbar">
        <div class="logo-container">
            <div class="logo-square">MAS</div>
            <span class="logo-full">MAS Technologies</span>
        </div>
        <nav>
            <a href="index.html">Home</a>
            <a href="products.html">Products</a>
            <a href="about.html">About</a>
            <a href="contact.html">Contact</a>
            <a href="cart.html" class="cart-link"><i class="fas fa-shopping-cart"></i> <span id="cartCount">0</span></a>
        </nav>
        <button class="mobile-menu-btn" onclick="toggleMobileMenu()"><i class="fas fa-bars"></i></button>
    </header>

    <section class="products-page">
        <div class="products-header">
            <h1>Our Products</h1>
            <div class="search-filter">
                <input type="text" id="searchInput" placeholder="Search products...">
                <select id="categoryFilter">
                    <option value="all">All Categories</option>
                    <option value="smartwatches">Smartwatches</option>
                    <option value="earpods">Earpods</option>
                    <option value="speakers">Speakers</option>
                    <option value="powerbanks">Powerbanks</option>
                    <option value="chargers">Chargers</option>
                    <option value="accessories">Accessories</option>
                </select>
            </div>
        </div>
        <div class="product-grid" id="productGrid"></div>
    </section>

    <footer class="footer">
        <div class="footer-content">
            <div class="footer-section">
                <h3>MAS Technologies</h3>
                <p>Premium tech accessories delivered across Kenya.</p>
            </div>
            <div class="footer-section">
                <h4>Quick Links</h4>
                <a href="products.html">Products</a>
                <a href="about.html">About</a>
                <a href="contact.html">Contact</a>
            </div>
            <div class="footer-section">
                <h4>Contact</h4>
                <p><i class="fas fa-phone"></i> 0746488634</p>
                <p><i class="fas fa-map-marker-alt"></i> Stanbank House, 6th Floor, Shop B621</p>
            </div>
            <div class="footer-section">
                <h4>Follow Us</h4>
                <div class="social-links">
                    <a href="#"><i class="fab fa-instagram"></i></a>
                    <a href="#"><i class="fab fa-tiktok"></i></a>
                </div>
            </div>
        </div>
        <div class="footer-bottom">
            <p>&copy; 2024 MAS Technologies. All rights reserved.</p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
